name: Build & Push vLLM XPU image (fork) to GHCR

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vllm-xpu-env

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4

      - name: Compute image name + tags (normalize owner to lowercase)
        id: meta
        shell: bash
        run: |
          OWNER_RAW="${{ github.repository_owner }}"
          OWNER_LC="$(echo "${OWNER_RAW}" | tr '[:upper:]' '[:lower:]')"

          IMAGE="${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_NAME }}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=latest" >> "$GITHUB_OUTPUT"

          echo "Using GHCR image: ${IMAGE}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (docker/Dockerfile.xpu)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.xpu
          push: true
          shm-size: 4g
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
